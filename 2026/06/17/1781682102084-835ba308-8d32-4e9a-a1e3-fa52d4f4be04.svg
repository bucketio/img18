<svg viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">K2 structure and chunking planning</title>
  <desc id="desc">Light themed diagram mapping enterprise file types to directory structure and chunking strategies in KnowFlow.</desc>
  <defs>
    <style>
      text { font-family: Inter, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .title { font-size: 32px; font-weight: 850; }
      .subtitle { font-size: 17px; fill: #667085; }
      .h { font-size: 20px; font-weight: 800; }
      .body { font-size: 15px; fill: #475467; }
      .tiny { font-size: 13px; fill: #667085; }
      .code { font-size: 15px; font-weight: 800; fill: #175cd3; }
      .white { fill: #ffffff; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#101828" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#12b76a"/>
    </marker>
  </defs>

  <rect width="1180" height="720" fill="#f8fafc"/>
  <path d="M0 0 H1180 V116 C930 156 800 72 584 118 C350 168 180 124 0 162 Z" fill="#eff8ff"/>

  <text x="72" y="72" class="title">K2：目录结构 + 分块策略</text>
  <text x="72" y="105" class="subtitle">目录让知识可维护，分块让知识可检索。不同文件类型，不应该用同一种处理方式。</text>

  <g transform="translate(72 166)">
    <rect width="330" height="422" rx="24" fill="#ffffff" stroke="#d0d5dd" filter="url(#shadow)"/>
    <text x="165" y="46" text-anchor="middle" class="h">树形目录组织</text>
    <text x="165" y="76" text-anchor="middle" class="body">围绕 K1 知识库分类展开</text>

    <line x1="84" y1="130" x2="84" y2="338" stroke="#98a2b3" stroke-width="2"/>
    <circle cx="84" cy="130" r="10" fill="#2f80ed"/>
    <text x="112" y="136" class="body">售前知识库</text>
    <line x1="84" y1="174" x2="118" y2="174" stroke="#98a2b3" stroke-width="2"/>
    <text x="132" y="180" class="tiny">产品线</text>
    <line x1="84" y1="216" x2="118" y2="216" stroke="#98a2b3" stroke-width="2"/>
    <text x="132" y="222" class="tiny">行业方案</text>
    <line x1="84" y1="258" x2="118" y2="258" stroke="#98a2b3" stroke-width="2"/>
    <text x="132" y="264" class="tiny">客户案例</text>
    <line x1="84" y1="300" x2="118" y2="300" stroke="#98a2b3" stroke-width="2"/>
    <text x="132" y="306" class="tiny">竞品对比</text>
    <line x1="84" y1="338" x2="118" y2="338" stroke="#98a2b3" stroke-width="2"/>
    <text x="132" y="344" class="tiny">报价政策</text>

    <rect x="52" y="372" width="226" height="34" rx="17" fill="#ecfdf3"/>
    <text x="165" y="394" text-anchor="middle" class="body">可维护、可授权、可追溯</text>
  </g>

  <line x1="426" y1="378" x2="524" y2="378" stroke="#12b76a" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(548 150)">
    <rect width="560" height="482" rx="24" fill="#ffffff" stroke="#d0d5dd" filter="url(#shadow)"/>
    <text x="280" y="46" text-anchor="middle" class="h">文件类型选择合适策略</text>

    <g transform="translate(36 82)">
      <rect width="488" height="56" rx="16" fill="#eef6ff" stroke="#b9d5ff"/>
      <text x="24" y="35" class="body">培训 PPT / 产品演示</text>
      <text x="322" y="35" class="code">page 分块</text>
    </g>
    <g transform="translate(36 154)">
      <rect width="488" height="56" rx="16" fill="#ecfdf3" stroke="#b7e4c7"/>
      <text x="24" y="35" class="body">制度 / 手册 / 报告</text>
      <text x="322" y="35" class="code">title 分块</text>
    </g>
    <g transform="translate(36 226)">
      <rect width="488" height="56" rx="16" fill="#fff7e6" stroke="#f6d69b"/>
      <text x="24" y="35" class="body">长文档 / 复杂上下文</text>
      <text x="322" y="35" class="code">parent_child</text>
    </g>
    <g transform="translate(36 298)">
      <rect width="488" height="56" rx="16" fill="#f4f0ff" stroke="#d8ccff"/>
      <text x="24" y="35" class="body">固定格式文件</text>
      <text x="322" y="35" class="code">regex 规则</text>
    </g>
    <g transform="translate(36 370)">
      <rect width="488" height="56" rx="16" fill="#fff1f3" stroke="#ffc7d0"/>
      <text x="24" y="35" class="body">FAQ / 专家经验 / 话术</text>
      <text x="322" y="35" class="code">QA 对</text>
    </g>
  </g>

  <g transform="translate(174 642)">
    <rect width="832" height="48" rx="24" fill="#172033"/>
    <text x="416" y="31" text-anchor="middle" class="white" font-size="17" font-weight="800">K2 的目标：把“文件”变成“适合 AI 检索的知识单元”</text>
  </g>
</svg>
