<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">32GB 提供更大余量</title>
  <desc id="desc">32GB 内存不是让轻任务快一倍，而是给重度多任务和创作任务留出余量</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <text x="70" y="84" fill="#111827" font-size="42" font-weight="700">32GB：不是快一倍，而是不容易卡</text>
    <text x="72" y="130" fill="#475569" font-size="24">当任务很多时，额外内存会变成稳定余量</text>
    <g transform="translate(105 220)">
      <rect width="430" height="300" rx="24" fill="#ffffff" stroke="#d1d5db"/>
      <text x="42" y="60" fill="#111827" font-size="30" font-weight="700">16GB 接近吃满</text>
      <rect x="50" y="115" width="330" height="54" rx="14" fill="#ef4444"/>
      <rect x="50" y="195" width="280" height="54" rx="14" fill="#fecaca"/>
      <text x="50" y="280" fill="#991b1b" font-size="23">切换软件、重新加载、卡顿更容易出现</text>
    </g>
    <g transform="translate(665 220)">
      <rect width="430" height="300" rx="24" fill="#ffffff" stroke="#d1d5db"/>
      <text x="42" y="60" fill="#111827" font-size="30" font-weight="700">32GB 还有余量</text>
      <rect x="50" y="115" width="280" height="54" rx="14" fill="#0f766e"/>
      <rect x="50" y="195" width="210" height="54" rx="14" fill="#99f6e4"/>
      <text x="50" y="280" fill="#115e59" font-size="23">多任务、创作、游戏后台更从容</text>
    </g>
  </g>
</svg>
